<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1512">
<title>Town-Squared</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: rgba(20, 16, 12, 0.72);
    --gold: #c9a24b;
    --parchment: #e9ddc2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1512;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #game { position: fixed; inset: 0; display: block; }

  /* ---- HUD ---- */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    color: var(--parchment);
  }
  .badge {
    position: absolute; top: max(10px, env(safe-area-inset-top)); left: 12px;
    background: var(--ink);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(201,162,75,0.35);
    border-radius: 6px;
    padding: 8px 14px 9px;
    line-height: 1.25;
  }
  .badge h1 {
    font-family: 'Cinzel', serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--gold);
  }
  .badge .sub {
    font-size: 11px;
    opacity: 0.8;
    display: flex; align-items: center; gap: 6px;
    margin-top: 2px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #888; flex: none;
    transition: background 0.3s;
  }
  .dot.online { background: #6fbf6a; box-shadow: 0 0 6px #6fbf6a; }
  .dot.local  { background: #c9a24b; }

  #hint {
    position: absolute; left: 50%; bottom: max(22px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    background: var(--ink);
    backdrop-filter: blur(6px);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 12.5px;
    white-space: nowrap;
    opacity: 1;
    transition: opacity 1.2s ease;
  }
  #hint.faded { opacity: 0; }

  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    /* Custom art: drop your image at assets/ui/loading-bg.png and it
       fills the screen (cover-cropped). The gradient above it keeps the
       title and bar readable over any artwork; if the file is missing,
       the ink base color shows alone — nothing breaks. */
    background:
      linear-gradient(rgba(26, 21, 18, 0.55), rgba(26, 21, 18, 0.75)),
      url('assets/ui/loading-bg.png') center / cover no-repeat,
      #1a1512;
    color: var(--parchment);
    z-index: 10;
    transition: opacity 0.6s ease;
  }
  #loading.done { opacity: 0; pointer-events: none; }
  #loading h1 {
    font-family: 'Cinzel', serif;
    font-weight: 700; font-size: 26px;
    letter-spacing: 0.12em;
    color: var(--gold);
  }
  #loading .bar {
    width: 180px; height: 3px;
    background: rgba(233,221,194,0.15);
    border-radius: 2px; overflow: hidden;
  }
  #loading .bar > div {
    height: 100%; width: 30%;
    background: var(--gold);
    border-radius: 2px;
    animation: sweep 1.1s ease-in-out infinite;
  }
  @keyframes sweep {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(620%); }
  }
  @media (prefers-reduced-motion: reduce) {
    #loading .bar > div { animation: none; width: 100%; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="badge">
    <h1>TOWN-SQUARED</h1>
    <div class="sub">
      <span id="netDot" class="dot"></span>
      <span id="netLabel">waking the town…</span>
    </div>
  </div>
  <div id="hint">Drag to rotate · pinch to zoom · tap the ground to walk</div>
</div>

<div id="loading">
  <h1>TOWN-SQUARED</h1>
  <div class="bar"><div></div></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
  }
}
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
